:root{
  --orange:#F94501;

  --max:1200px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Open Sans',sans-serif;
  background:var(--orange);
  color:var(--white);

}

/* Layout */

.container{
  max-width:var(--max);

  padding:0 20px;
}

/* NAV */

nav{

  display:flex;

}

.logo{

}

}

.nav-cta:hover{

}

/* HERO */

.hero{

  transition:0.3s ease;
}

.cta-button:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.hero img{
  width:100%;

}

}

}

.panel p{
  font-size:1.05rem;
  margin-bottom:14px;
}

.highlight{
  color:var(--orange);
  font-weight:900;
}

.dark{
  background:var(--black);
  padding:70px 0;
}

}

  font-size:1.05rem;
  max-width:650px;
  margin-bottom:14px;
}

.services{
  background:white;

}

  text-align:center;
}

.service-grid{
  display:grid;

}

}

}

.service-card h3{
  font-family:'Poppins';
  font-size:1.1rem;
  margin-bottom:10px;
}
